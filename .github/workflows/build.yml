name: Build distributables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # `artifact_path` globs pick up the installer + the
          # electron-updater metadata files (.yml, .blockmap, and the
          # mac-only .zip that the updater extracts from) — all of them
          # need to land on the GitHub Release for auto-update to work.
          - os: windows-latest
            script: dist:win
            artifact_name: runwa-windows
            artifact_path: |
              release/*.exe
              release/*.exe.blockmap
              release/latest.yml
          - os: macos-latest
            script: dist:mac
            artifact_name: runwa-macos
            artifact_path: |
              release/*.dmg
              release/*.zip
              release/*.blockmap
              release/latest-mac.yml
          - os: ubuntu-latest
            script: dist:linux
            artifact_name: runwa-linux
            artifact_path: |
              release/*.AppImage
              release/latest-linux.yml

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxtst-dev libxt-dev libxi-dev \
            libxrandr-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libxkbfile-dev \
            libpng-dev

      - name: Install dependencies
        run: npm ci

      - name: Build native addon
        run: npm run build:native

      - name: Build distributable
        run: npm run ${{ matrix.script }} -- --publish=never

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create draft release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
