appId: dev.dmitr.runwa
productName: Runwa
icon: resources/icon.png
directories:
  output: release
  buildResources: build
# electron-updater reads release metadata from the GitHub repo's public
# releases API. `publish: never` in CI keeps us out of electron-builder's
# own upload path — the workflow uploads artifacts (including the .yml
# update manifests) via softprops/action-gh-release instead, so we keep
# the "draft, review, hit publish" review step. electron-updater doesn't
# care who uploaded the files, only that they're present on the release.
publish:
  provider: github
  owner: bedware-software
  repo: runwa
files:
  - out/**
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
extraResources:
  - from: native
    to: native
    filter:
      - "*.node"
      - index.js
      - index.d.ts
      - package.json
  - from: resources/icon.png
    to: icon.png
  # Per-desktop-number tray icons (1.ico…10.ico, +.ico) in two themes
  # (black-on-white for dark taskbars, white-on-black for light taskbars).
  # Used by the tray manager to reflect the current virtual desktop.
  - from: resources/tray-icons
    to: tray-icons
asarUnpack:
  - "**/*.node"
  - native/**
  # uiohook-napi ships prebuilt native binaries per-platform; they must be
  # unpacked from the asar so the dynamic loader can dlopen them.
  - node_modules/uiohook-napi/prebuilds/**
# All of this project's native deps are N-API (ABI-stable across Node/Electron):
# `uiohook-napi` ships prebuilts per-platform, and the Rust addon in `native/`
# is napi-rs and built separately via `npm run build:native`. Letting
# @electron/rebuild walk node_modules would pointlessly try to recompile
# uiohook-napi through node-gyp — which breaks on Python 3.12+ (distutils gone).
npmRebuild: false
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    # `zip` is required alongside `dmg` for electron-updater's mac path:
    # mounting a .dmg to replace the running app is awkward, so the
    # updater downloads the .zip, unpacks the .app bundle, and relaunches.
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  extendInfo:
    # Required so the Groq transcription module can open the default
    # microphone; shown once when macOS prompts the user for permission.
    NSMicrophoneUsageDescription: runwa uses the microphone to record voice input for the Groq transcription module.
linux:
  target:
    - AppImage
  category: Utility
