appId: dev.dmitr.runwa
productName: runwa
icon: resources/icon.png
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
  - "!**/node_modules/*/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/node_modules/*/{test,__tests__,tests,powered-test,example,examples}"
extraResources:
  - from: native
    to: native
    filter:
      - "*.node"
      - index.js
      - index.d.ts
      - package.json
  - from: resources/icon.png
    to: icon.png
asarUnpack:
  - "**/*.node"
  - native/**
  # uiohook-napi ships prebuilt native binaries per-platform; they must be
  # unpacked from the asar so the dynamic loader can dlopen them.
  - node_modules/uiohook-napi/prebuilds/**
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.utilities
  extendInfo:
    # Required so the Groq transcription module can open the default
    # microphone; shown once when macOS prompts the user for permission.
    NSMicrophoneUsageDescription: runwa uses the microphone to record voice input for the Groq transcription module.
linux:
  target:
    - AppImage
  category: Utility
